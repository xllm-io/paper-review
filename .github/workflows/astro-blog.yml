# Sample workflow for building and deploying an Astro site to GitHub Pages
#
# To get started with Astro see: https://docs.astro.build/en/getting-started/
#
name: Deploy Astro site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
  # Runs build checks for pull requests targeting main
  pull_request:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
  packages: read

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  BUILD_PATH: "." # default value when not using subfolders
  DEFAULT_BLOG_CONTENT_DIR: "./src/content/blog"
  # BUILD_PATH: subfolder

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            echo "runner=yarn" >> $GITHUB_OUTPUT
            echo "lockfile=yarn.lock" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            echo "runner=npx --no-install" >> $GITHUB_OUTPUT
            echo "lockfile=package-lock.json" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager"
            exit 1
          fi
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: ${{ steps.detect-package-manager.outputs.manager }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@xllm-io'
          # cache-dependency-path: ${{ env.BUILD_PATH }}/${{ steps.detect-package-manager.outputs.lockfile }}
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
      - name: Install dependencies
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}
        working-directory: ${{ env.BUILD_PATH }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Checkout private blog content
        env:
          custom_token: ${{ secrets.CUSTOM_CONTENT_REPO_TOKEN }}
        if: ${{ vars.CUSTOM_CONTENT_REPO != '' && env.custom_token != '' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.CUSTOM_CONTENT_REPO }}
          token: ${{ secrets.CUSTOM_CONTENT_REPO_TOKEN }}
          path: papers
      - name: Resolve blog content directory
        id: resolve-blog-content
        env:
          custom_repo: ${{ vars.CUSTOM_CONTENT_REPO }}
        run: |
          if [[ -n "${{ env.custom_repo }}" ]]; then
            BLOG_CONTENT_DIR="${{ github.workspace }}/papers/docs"
          else
            BLOG_CONTENT_DIR="${{ github.workspace }}/${{ env.DEFAULT_BLOG_CONTENT_DIR }}"
          fi
          if [[ ! -d "$BLOG_CONTENT_DIR" ]]; then
            echo "Blog content directory not found: $BLOG_CONTENT_DIR"
            exit 1
          fi
          echo "blog_content_dir=$BLOG_CONTENT_DIR" >> "$GITHUB_OUTPUT"
      - name: Build with Astro
        run: |
          BASE_PATH="${{ steps.pages.outputs.base_path }}"
          case "$BASE_PATH" in
            */) ;;
            *) BASE_PATH="${BASE_PATH}/" ;;
          esac
          ${{ steps.detect-package-manager.outputs.runner }} astro build \
            --site "${{ steps.pages.outputs.origin }}" \
            --base "$BASE_PATH"
        working-directory: ${{ env.BUILD_PATH }}
        env:
          BLOG_CONTENT_DIR: ${{ steps.resolve-blog-content.outputs.blog_content_dir }}
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ env.BUILD_PATH }}/dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
